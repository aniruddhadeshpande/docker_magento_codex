; New Relic PHP agent configuration for the Magento learning stack.
; The extension is present in the image, but telemetry stays disabled unless
; NEW_RELIC_ENABLED=true is set at runtime.

extension = "newrelic.so"

newrelic.enabled = ${NEW_RELIC_ENABLED}
newrelic.license = "${NEW_RELIC_LICENSE_KEY}"
newrelic.appname = "${NEW_RELIC_APP_NAME}"
newrelic.loglevel = "${NEW_RELIC_LOG_LEVEL}"
newrelic.log_file = "/tmp/newrelic-php-agent.log"

; Use a separate daemon container in the observability profile.
newrelic.daemon.dont_launch = true
newrelic.daemon.address = "newrelic-php-daemon:31339"

newrelic.distributed_tracing_enabled = ${NEW_RELIC_DISTRIBUTED_TRACING_ENABLED}
newrelic.browser_monitoring.auto_instrument = ${NEW_RELIC_BROWSER_MONITORING_AUTO_INSTRUMENT}

; Privacy-focused defaults. Magento routes are useful; raw request parameters
; and SQL values are not safe for this learning stack.
newrelic.capture_params = false
newrelic.transaction_tracer.record_sql = "obfuscated"
newrelic.attributes.enabled = true
newrelic.error_collector.enabled = true
newrelic.datastore_tracer.database_name_reporting.enabled = true
newrelic.datastore_tracer.instance_reporting.enabled = true
