map $http_x_forwarded_proto $fastcgi_https {
    default off;
    https on;
}

upstream fastcgi_backend {
    server php-fpm:9000;
}

server {
    listen 80;
    server_name magento.docker;

    set $MAGE_ROOT /var/www/html;
    root $MAGE_ROOT/pub;
    index index.php;

    charset utf-8;
    client_max_body_size 64m;

    access_log /var/log/nginx/magento-access.log;
    error_log /var/log/nginx/magento-error.log;

    # Lightweight container health endpoints that do not require Magento.
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Internal endpoint for the OpenTelemetry NGINX receiver.
    location = /nginx_status {
        stub_status;
        access_log off;
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        allow 10.0.0.0/8;
        allow 192.168.0.0/16;
        deny all;
    }

    # Internal PHP-FPM status endpoints for the php-fpm exporter.
    location ~ ^/(fpm-status|fpm-ping)$ {
        access_log off;
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        allow 10.0.0.0/8;
        allow 192.168.0.0/16;
        deny all;

        fastcgi_pass fastcgi_backend;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
    }

    # Never expose Magento application internals. The public root is /pub only.
    location ~* ^/(app|bin|dev|generated|lib|phpserver|setup|update|var|vendor)/ {
        deny all;
    }

    location ~* /(composer\.(json|lock)|auth\.json|\.user\.ini|\.git|\.env) {
        deny all;
    }

    # Magento storefront, admin, and API routes enter through the front controller.
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # Static assets may be generated by Magento when they do not exist yet.
    location /static/ {
        expires max;
        add_header Cache-Control "public";

        rewrite ^/static/version\d+/(.*)$ /static/$1 last;

        if (!-f $request_filename) {
            rewrite ^/static/(version\d*/)?(.*)$ /static.php?resource=$2 last;
        }
    }

    # Media is public, but PHP execution inside media is blocked below.
    location /media/ {
        try_files $uri $uri/ /get.php$is_args$args;
    }

    location ~* ^/media/.*\.php$ {
        deny all;
    }

    location ~ ^/(index|get|static|report|404|503)\.php$ {
        try_files $uri =404;

        fastcgi_pass fastcgi_backend;
        fastcgi_index index.php;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;

        # TLS terminates before Varnish, so Magento must learn the public scheme
        # from forwarded headers rather than from this internal HTTP hop.
        fastcgi_param HTTPS $fastcgi_https;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PORT $http_x_forwarded_port;

        fastcgi_param MAGE_RUN_TYPE store;
        fastcgi_param MAGE_RUN_CODE "";

        fastcgi_read_timeout 300s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Any other PHP file should not be directly executable.
    location ~ \.php$ {
        deny all;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
