services:
  tls-proxy:
    image: nginx:1.30-alpine
    depends_on:
      varnish:
        condition: service_healthy
    ports:
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./tls/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - learning_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null --no-check-certificate https://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  varnish:
    image: varnish:7
    depends_on:
      nginx:
        condition: service_healthy
    volumes:
      - ./varnish/default.vcl:/etc/varnish/default.vcl:ro
      - varnish_workdir:/var/lib/varnish
    command: ["varnishd", "-F", "-f", "/etc/varnish/default.vcl", "-a", "http=:80,HTTP", "-s", "malloc,256m"]
    networks:
      - learning_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "varnishadm ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  nginx:
    image: nginx:1.30-alpine
    depends_on:
      php-fpm:
        condition: service_started
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./magento:/var/www/html:ro
    networks:
      - learning_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  php-fpm:
    build:
      context: ./php
      dockerfile: Dockerfile
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      MAGENTO_BASE_URL: ${MAGENTO_BASE_URL}
      MAGENTO_BACKEND_FRONTNAME: ${MAGENTO_BACKEND_FRONTNAME}
      MAGENTO_ADMIN_USER: ${MAGENTO_ADMIN_USER}
      MAGENTO_ADMIN_PASSWORD: ${MAGENTO_ADMIN_PASSWORD}
      MAGENTO_ADMIN_EMAIL: ${MAGENTO_ADMIN_EMAIL}
      MAGENTO_ADMIN_FIRSTNAME: ${MAGENTO_ADMIN_FIRSTNAME}
      MAGENTO_ADMIN_LASTNAME: ${MAGENTO_ADMIN_LASTNAME}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      OPENSEARCH_HOST: ${OPENSEARCH_HOST}
      OPENSEARCH_PORT: ${OPENSEARCH_PORT}
      OPENSEARCH_INDEX_PREFIX: ${OPENSEARCH_INDEX_PREFIX}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_CACHE_DB: ${REDIS_CACHE_DB}
      REDIS_SESSION_DB: ${REDIS_SESSION_DB}
      REDIS_CACHE_SERIALIZER: ${REDIS_CACHE_SERIALIZER}
      HTTP_CACHE_HOSTS: ${HTTP_CACHE_HOSTS}
      VARNISH_BACKEND_HOST: ${VARNISH_BACKEND_HOST}
      VARNISH_BACKEND_PORT: ${VARNISH_BACKEND_PORT}
      VARNISH_PURGE_ACCESS_LIST: ${VARNISH_PURGE_ACCESS_LIST}
      NEW_RELIC_ENABLED: ${NEW_RELIC_ENABLED:-false}
      NEW_RELIC_LICENSE_KEY: ${NEW_RELIC_LICENSE_KEY:-}
      NEW_RELIC_REGION: ${NEW_RELIC_REGION:-US}
      NEW_RELIC_APP_NAME: ${NEW_RELIC_APP_NAME:-docker-magento-learning}
      NEW_RELIC_ENVIRONMENT: ${NEW_RELIC_ENVIRONMENT:-local}
      NEW_RELIC_LOG_LEVEL: ${NEW_RELIC_LOG_LEVEL:-info}
      NEW_RELIC_DISTRIBUTED_TRACING_ENABLED: ${NEW_RELIC_DISTRIBUTED_TRACING_ENABLED:-true}
      NEW_RELIC_BROWSER_MONITORING_AUTO_INSTRUMENT: ${NEW_RELIC_BROWSER_MONITORING_AUTO_INSTRUMENT:-true}
      COMPOSER_HOME: /var/www/.composer
      COMPOSER_CACHE_DIR: /tmp/composer-cache
      COMPOSER_ALLOW_SUPERUSER: "1"
    depends_on:
      mysql:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./magento:/var/www/html
      - ./auth:/var/www/.composer:ro
    networks:
      - learning_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  newrelic-php-daemon:
    image: newrelic/php-daemon:latest
    profiles:
      - observability
    environment:
      NEW_RELIC_LOG_LEVEL: ${NEW_RELIC_LOG_LEVEL:-info}
    networks:
      - learning_network
    restart: unless-stopped

  newrelic-infra:
    image: newrelic/infrastructure-bundle:latest
    profiles:
      - observability
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ -z "$$NRIA_LICENSE_KEY" ]; then
          echo "NEW_RELIC_LICENSE_KEY is empty; newrelic-infra is idle."
          tail -f /dev/null
        fi
        exec /sbin/tini -- /usr/bin/newrelic-infra-service
    privileged: true
    pid: host
    environment:
      NRIA_LICENSE_KEY: ${NEW_RELIC_LICENSE_KEY:-}
      NRIA_DISPLAY_NAME: ${APP_NAME:-docker-magento-learning}-${NEW_RELIC_ENVIRONMENT:-local}
      NRIA_LOG_LEVEL: ${NEW_RELIC_LOG_LEVEL:-info}
    volumes:
      - /:/host:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./newrelic/infrastructure/newrelic-infra.yml:/etc/newrelic-infra.yml:ro
      - ./newrelic/infrastructure/logging.yml:/etc/newrelic-infra/logging.d/docker-magento.yml:ro
      - ./newrelic/infrastructure/integrations:/etc/newrelic-infra/integrations.d:ro
    networks:
      - learning_network
    restart: unless-stopped

  newrelic-otel-collector:
    image: otel/opentelemetry-collector-contrib:0.128.0
    profiles:
      - observability
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    environment:
      NEW_RELIC_LICENSE_KEY: ${NEW_RELIC_LICENSE_KEY:-}
      NEW_RELIC_OTLP_ENDPOINT: ${NEW_RELIC_OTLP_ENDPOINT:-https://otlp.nr-data.net:4318}
      NEW_RELIC_ENVIRONMENT: ${NEW_RELIC_ENVIRONMENT:-local}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    volumes:
      - ./newrelic/otel/collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      nginx:
        condition: service_healthy
      tls-proxy:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      php-fpm-exporter:
        condition: service_started
      mysql-exporter:
        condition: service_started
      opensearch-exporter:
        condition: service_started
      varnish-exporter:
        condition: service_started
    networks:
      - learning_network
    restart: unless-stopped

  php-fpm-exporter:
    image: hipages/php-fpm_exporter:2.2.0
    profiles:
      - observability
    command:
      - --phpfpm.scrape-uri=tcp://php-fpm:9000/fpm-status
      - --web.listen-address=:9253
    depends_on:
      php-fpm:
        condition: service_started
    networks:
      - learning_network
    restart: unless-stopped

  mysql-exporter:
    image: prom/mysqld-exporter:v0.16.0
    profiles:
      - observability
    command:
      - --mysqld.address=mysql:3306
      - --mysqld.username=${MYSQL_USER:-magento}
    environment:
      MYSQLD_EXPORTER_PASSWORD: ${MYSQL_PASSWORD:-}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - learning_network
    restart: unless-stopped

  opensearch-exporter:
    image: quay.io/prometheuscommunity/elasticsearch-exporter:v1.8.0
    profiles:
      - observability
    command:
      - --es.uri=http://opensearch:9200
      - --es.all
      - --es.indices
      - --collector.clustersettings
      - --web.listen-address=:9114
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - learning_network
    restart: unless-stopped

  varnish-exporter:
    build:
      context: ./newrelic/exporters/varnish
      dockerfile: Dockerfile
    image: docker_magento-varnish-exporter
    profiles:
      - observability
    environment:
      VARNISH_NAME: /var/lib/varnish/varnishd
      VARNISH_EXPORTER_PORT: 9131
    volumes:
      - varnish_workdir:/var/lib/varnish:ro
    depends_on:
      varnish:
        condition: service_healthy
    networks:
      - learning_network
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    command: ["--log-bin-trust-function-creators=1"]
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - learning_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:5.2-apache
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    networks:
      - learning_network
    restart: unless-stopped

  opensearch:
    image: opensearchproject/opensearch:3
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      bootstrap.memory_lock: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - learning_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20

  rabbitmq:
    image: rabbitmq:4.2-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - learning_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10

  redis:
    image: redis:6.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - learning_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  learning_network:
    name: docker_magento_learning_network
    external: true

volumes:
  mysql_data:
  opensearch_data:
  rabbitmq_data:
  redis_data:
  varnish_workdir:
